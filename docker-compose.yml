# App stack: ML + API + static UI. Use your existing Mongo on the host (or another container) via MONGO_URI.
# Jenkins is intentionally NOT included (run your existing Jenkins container separately).

services:
  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    environment:
      FLASK_DEBUG: "0"
      PORT: "8000"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
    - .env  
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ml-service

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
